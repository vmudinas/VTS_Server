version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_SERVER=${DB_SERVER:-db}
      - DB_PORT=${DB_PORT:-1433}
      - DB_NAME=${DB_NAME:-FAI}
      - DB_USER=${DB_USER:-sa}
      - DB_PASSWORD=${DB_PASSWORD:-YourStrong@Passw0rd}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_min_256_bits_long_for_security}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-secure_password}
      - BITCOIN_SEED_PHRASE=${BITCOIN_SEED_PHRASE:-your_seed_phrase}
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - vts-network

  db:
    build:
      context: ./docker/sql
      dockerfile: Dockerfile.sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped
    networks:
      - vts-network

volumes:
  sqldata:

networks:
  vts-network:
    driver: bridge